<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Tools - Gender Test & Lotto</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine & TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="themeToggle" class="theme-toggle">Dark Mode</button>
    
    <div class="container">
        <nav class="tabs">
            <button class="tab-btn active" data-tab="lotto">Lotto Generator</button>
            <button class="tab-btn" data-tab="ai-test">Gender AI Test</button>
        </nav>

        <div id="lotto" class="tab-content active">
            <h1>Lotto Number Generator</h1>
            <button id="generate" class="main-btn">Generate Numbers</button>
            <div id="result" class="ball-container"></div>
        </div>

        <div id="ai-test" class="tab-content">
            <h1>Gender AI Test</h1>
            <p class="subtitle">AI가 분석하는 나의 성별 관상 테스트</p>
            
            <div id="upload-area" class="upload-box">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <div class="upload-placeholder">
                    <span class="icon">📸</span>
                    <p>클릭하거나 사진을 드래그하세요</p>
                    <button class="upload-btn" onclick="document.getElementById('image-upload').click()">사진 업로드</button>
                </div>
            </div>

            <div id="webcam-container" class="webcam-box" style="display: none;">
                <div id="webcam-wrapper"></div>
                <button id="capture-btn" class="main-btn">사진 촬영</button>
            </div>

            <div class="input-switch">
                <button id="toggle-webcam" class="secondary-btn">카메라 사용하기</button>
            </div>

            <div id="loading" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 분석 중입니다...</p>
            </div>

            <div id="prediction-result" class="prediction-container" style="display: none;">
                <img id="face-image" src="" alt="Captured image" class="preview-img">
                <div id="label-container" class="label-list"></div>
                <button id="retry-btn" class="secondary-btn">다시 시도</button>
            </div>
        </div>

        <div class="contact-form">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xkokbybw" method="POST">
                <input type="email" name="email" placeholder="이메일 주소" required>
                <textarea name="message" placeholder="문의 내용을 입력하세요" required></textarea>
                <button type="submit">문의하기</button>
            </form>
        </div>

        <div id="comments">
            <hr>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://product-builder-d0rbydpslj.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
